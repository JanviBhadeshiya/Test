<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Birthday Question ❤️</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;

      font-family:  "Trebuchet MS", "Verdana", "Arial", sans-serif;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body{

      background:#ffc0cb;

      display:flex;
      justify-content:center;
      align-items:center;

      position:relative;

      padding:12px;

      touch-action:manipulation;
    }

    /* Floating Hearts */

    .heart{
      position:absolute;

      color:rgba(255,0,0,0.16);

      user-select:none;
      pointer-events:none;

      animation:float 8s linear infinite;
    }

    @keyframes float{

      from{
        transform:translateY(110vh) rotate(0deg);
      }

      to{
        transform:translateY(-130vh) rotate(360deg);
      }
    }

    /* Main Card */

    .container{

      width:100%;
      max-width:390px;

      height:96vh;

      background:rgba(255,255,255,0.15);

      border-radius:28px;

      padding:22px 18px;

      text-align:center;

      position:relative;

      overflow:hidden;

      box-shadow:0 10px 28px rgba(0,0,0,0.12);

      backdrop-filter:blur(4px);

      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* GIF */

    .gif{

      width:78%;
      max-width:240px;

      border-radius:24px;

      margin-bottom:24px;

      box-shadow:0 8px 20px rgba(0,0,0,0.18);
    }

    /* Heading */

    h1{

      color:#b30059;

      font-size:2rem;

      line-height:1.35;

      margin-bottom:40px;

      padding:0 8px;
    }

    /* Buttons Area */

    .buttons{

      position:relative;

      width:100%;

      min-height:180px;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;

      gap:16px;
    }

    button{

      border:none;

      border-radius:999px;

      padding:16px 26px;

      font-size:1.05rem;

      font-weight:bold;

      color:white;

      cursor:pointer;

      transition:all 0.25s ease;

      box-shadow:0 6px 16px rgba(0,0,0,0.2);

      min-width:180px;

      text-align:center;

      font-family:"Trebuchet MS", "Verdana", "Arial", sans-serif;
    }

    /* Green Button */

    #yesBtn{

      background:#24b343;

      transform:scale(1);

      z-index:2;
    }

    /* Red Button */

    #noBtn{

      background:#ff3b3b;

      transform:scale(1);

      z-index:1;
    }

    /* Final Message */

    .message{

      margin-top:auto;

      margin-bottom:10px;

      font-size:1.8rem;

      line-height:1.45;

      color:#cc0066;

      display:none;

      animation:pop 0.4s ease;
    }

    @keyframes pop{

      0%{
        transform:scale(0.5);
        opacity:0;
      }

      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    /* iPhone 15 / 16 */

    @media (max-width:430px){

      .container{

        max-width:100%;

        height:95vh;

        padding:20px 16px;
      }

      .gif{

        width:82%;
        max-width:220px;
      }

      h1{

        font-size:1.65rem;

        margin-bottom:34px;
      }

      button{

        min-width:170px;

        font-size:0.98rem;

        padding:14px 22px;
      }

      .message{

        font-size:1.55rem;
      }
    }

    /* Small Devices */

    @media (max-width:360px){

      h1{
        font-size:1.45rem;
      }

      button{

        min-width:160px;

        font-size:0.9rem;
      }

      .message{
        font-size:1.3rem;
      }
    }

  </style>
</head>

<body>

  <!-- Floating Hearts -->

  <script>

    for(let i = 0; i < 35; i++){

      let heart = document.createElement("div");

      heart.className = "heart";

      heart.innerHTML = "❤";

      heart.style.left =
        Math.random() * 100 + "vw";

      heart.style.fontSize =
        (18 + Math.random() * 30) + "px";

      heart.style.animationDuration =
        (5 + Math.random() * 6) + "s";

      heart.style.animationDelay =
        Math.random() * 5 + "s";

      document.body.appendChild(heart);
    }

  </script>

  <!-- Main Container -->

  <div class="container">

    <!-- GIF -->

    <img
      class="gif"
      src="https://media.giphy.com/media/v6aOjy0Qo1fIA/giphy.gif"
      alt="Cute Cat"
    />

    <!-- Heading -->

    <h1>
      What do you want for your birthday, Husband? ❤️
    </h1>

    <!-- Buttons -->

    <div class="buttons">

      <button id="yesBtn">
        PS4 🎮
      </button>

      <button id="noBtn">
        Nothing
      </button>

    </div>

    <!-- Final Message -->

    <div
      class="message"
      id="message"
    >

      YAYYYY!! 🎉❤️<br>
      PS4 IT IS 😍

    </div>

  </div>

  <script>

    const yesBtn =
      document.getElementById("yesBtn");

    const noBtn =
      document.getElementById("noBtn");

    const message =
      document.getElementById("message");

    const buttons =
      document.querySelector(".buttons");

    const texts = [

      "Nothing",
      "Are you sure?",
      "Pretty Please 🥺",
      "It will make me happy ❤️",
      "Last chance 😊"
    ];

    let clickCount = 0;

    let floatCount = 0;

    let yesScale = 1;

    let noScale = 1;

    // RED BUTTON CLICK

    noBtn.addEventListener("click", () => {

      clickCount++;

      // Grow green button

      yesScale += 0.12;

      yesBtn.style.transform =
        `scale(${yesScale})`;

      // Shrink red button slightly

      if(clickCount < 5){

        noScale -= 0.03;

        noBtn.style.transform =
          `scale(${Math.max(noScale, 0.88)})`;
      }

      // Change text

      if(clickCount < texts.length){

        noBtn.innerText =
          texts[clickCount];
      }

      // Floating mode after last chance

      if(clickCount >= 4){

        if(floatCount < 3){

          noBtn.style.position = "fixed";

          const padding = 20;

          const maxX =
            window.innerWidth -
            noBtn.offsetWidth -
            padding;

          const maxY =
            window.innerHeight -
            noBtn.offsetHeight -
            120;

          const randomX =
            Math.random() *
            (maxX - padding) +
            padding;

          const randomY =
            Math.random() *
            (maxY - 120) +
            120;

          noBtn.style.left =
            randomX + "px";

          noBtn.style.top =
            randomY + "px";

          floatCount++;

        } else {

          // Hide red button

          noBtn.style.display = "none";

          // Center green button properly

          buttons.style.justifyContent =
            "center";

          yesBtn.style.transform =
            "scale(1.35)";

          setTimeout(() => {

            yesBtn.click();

          }, 700);
        }
      }

    });

    // GREEN BUTTON CLICK

    yesBtn.addEventListener("click", () => {

      // Remove red button

      noBtn.style.display = "none";

      // Center button

      buttons.style.justifyContent =
        "center";

      // Grow green button

      yesBtn.style.transform =
        "scale(1.35)";

      // Change button text

      yesBtn.innerHTML =
        "BEST HUSBAND ❤️";

      // Show message

      message.style.display =
        "block";
    });

  </script>

</body>
</html>
