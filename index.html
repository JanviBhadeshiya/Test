<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Question ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Comic Sans MS', cursive, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      background:#ffc0cb;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    /* Floating Hearts */
    .heart{
      position:absolute;
      color:rgba(255,0,0,0.22);
      user-select:none;
      animation:float 8s linear infinite;
    }

    @keyframes float{
      from{
        transform:translateY(100vh) rotate(0deg);
      }
      to{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    .container{
      text-align:center;
      z-index:10;
      padding:20px;
      width:100%;
      max-width:700px;
    }

    h1{
      color:#b30059;
      font-size:2.2rem;
      margin-bottom:20px;
    }

    .gif{
      width:240px;
      border-radius:20px;
      margin-bottom:25px;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .buttons{
      position:relative;
      width:100%;
      height:320px;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    button{
      border:none;
      border-radius:50px;
      padding:15px 30px;
      font-size:1.2rem;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:all 0.3s ease;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    /* Green Button */
    #yesBtn{
      background:#28a745;
      position:relative;
      z-index:2;
      transform:scale(1);
    }

    /* Red Button */
    #noBtn{
      background:#ff3b3b;
      position:absolute;
      left:62%;
      top:50%;
      transform:translateY(-50%) scale(1);
      z-index:1;
    }

    .message{
      margin-top:25px;
      font-size:2rem;
      color:#cc0066;
      display:none;
      animation:pop 0.5s ease;
    }

    @keyframes pop{
      0%{
        transform:scale(0.5);
      }
      100%{
        transform:scale(1);
      }
    }

  </style>
</head>

<body>

  <!-- Floating Hearts -->
  <script>
    for(let i = 0; i < 35; i++){

      let heart = document.createElement("div");

      heart.className = "heart";
      heart.innerHTML = "❤";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (20 + Math.random() * 40) + "px";
      heart.style.animationDuration = (5 + Math.random() * 6) + "s";
      heart.style.animationDelay = Math.random() * 5 + "s";

      document.body.appendChild(heart);
    }
  </script>

  <div class="container">

    <!-- Cute Cat GIF -->
    <img
      class="gif"
      src="https://media.giphy.com/media/v6aOjy0Qo1fIA/giphy.gif"
      alt="Cute Cat"
    />

    <h1>What do you want for your birthday, Husband? ❤️</h1>

    <div class="buttons">
      <button id="yesBtn">PS4 🎮</button>
      <button id="noBtn">Nothing</button>
    </div>

    <div class="message" id="message">
      YAYYYY!! 🎉❤️<br>
      PS4 IT IS 😍
    </div>

  </div>

  <script>

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    const texts = [
      "Nothing",
      "Are you sure?",
      "Pretty Please",
      "It will make me happy",
      "Last chance 😊"
    ];

    let clickCount = 0;
    let floatCount = 0;

    let yesScale = 1;
    let noScale = 1;

    // RED BUTTON CLICK
    noBtn.addEventListener("click", () => {

      clickCount++;

      // Grow green button
      yesScale += 0.25;
      yesBtn.style.transform = `scale(${yesScale})`;

      // Shrink red button
      if(clickCount < 5){
        noScale -= 0.12;
        noBtn.style.transform =
          `translateY(-50%) scale(${noScale})`;
      }

      // Change button text
      if(clickCount < texts.length){
        noBtn.innerText = texts[clickCount];
      }

      // Floating random button after last chance
      if(clickCount >= 4){

        if(floatCount < 3){

          const randomX =
            Math.random() * (window.innerWidth - 180);

          const randomY =
            Math.random() * (window.innerHeight - 100);

          noBtn.style.left = randomX + "px";
          noBtn.style.top = randomY + "px";

          floatCount++;

        } else {

          // Auto click green button
          noBtn.style.display = "none";

          setTimeout(() => {
            yesBtn.click();
          }, 800);
        }
      }

    });

    // GREEN BUTTON CLICK
    yesBtn.addEventListener("click", () => {

      // Hide red button forever
      noBtn.style.display = "none";

      // Make green button bigger
      yesBtn.style.transform = "scale(1.5)";

      // Change button text
      yesBtn.innerHTML = "BEST HUSBAND ❤️";

      // Show cute message
      message.style.display = "block";

    });

  </script>

</body>
</html>
